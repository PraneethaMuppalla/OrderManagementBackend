version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: oms_postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: oms_user
      POSTGRES_PASSWORD: confirm_password
      POSTGRES_DB: order_management_db
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: oms_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
